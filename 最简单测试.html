<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最简单测试 - 验证 startTest()</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px;
        }
        button:hover {
            background: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>🔧 最简单测试 - 验证 startTest() 函数</h1>
    <p>这个页面只测试 startTest() 函数是否被调用</p>
    
    <button onclick="testStartTest()">点击测试 startTest()</button>
    
    <div id="result"></div>
    
    <script>
        // 最简单的 startTest 函数
        function startTest() {
            console.log('✅ startTest() 函数被调用！');
            const result = document.getElementById('result');
            result.innerHTML = '<div class="success"><strong>✅ 成功！</strong> startTest() 函数被正常调用。</div>';
            result.innerHTML += '<p>检查浏览器控制台（按F12）查看日志。</p>';
            
            // 模拟初始化测试
            window.currentTest = {
                currentQuestion: 0,
                score: 0,
                answers: [],
                startTime: new Date(),
                questionOrder: [{type: 'vocabulary', id: 1}],
                difficultyLevel: "基础"
            };
            
            // 尝试调用 showTestQuestion（如果存在）
            if (typeof showTestQuestion === 'function') {
                showTestQuestion();
            } else {
                result.innerHTML += '<p class="error">⚠️ showTestQuestion() 函数未定义</p>';
            }
        }
        
        // 测试函数
        function testStartTest() {
            console.log('开始测试...');
            try {
                startTest();
            } catch (error) {
                const result = document.getElementById('result');
                result.innerHTML = `<div class="error"><strong>❌ 错误！</strong> ${error.message}</div>`;
                console.error('测试错误:', error);
            }
        }
        
        // 页面加载时显示状态
        window.onload = function() {
            console.log('最简单测试页面已加载');
            document.getElementById('result').innerHTML = '<p>点击上方按钮开始测试</p>';
        };
    </script>
</body>
</html>
