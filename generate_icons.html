<!DOCTYPE html>
<html>
<head>
    <title>生成雅思猫图标</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .icon-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
        }
        .icon-box {
            text-align: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .icon-canvas {
            border: 1px solid #ccc;
            background: white;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #5a67d8;
        }
        .instructions {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🐱 雅思猫图标生成器</h1>
    
    <div class="instructions">
        <h3>使用说明：</h3>
        <ol>
            <li>点击下面的"生成所有图标"按钮</li>
            <li>右键点击每个图标，选择"图片另存为"</li>
            <li>保存到 <code>icons/</code> 文件夹，文件名如 <code>icon-72.png</code></li>
            <li>需要生成以下尺寸：72x72, 96x96, 128x128, 144x144, 152x152, 192x192, 384x384, 512x512</li>
        </ol>
    </div>
    
    <div class="icon-container" id="iconContainer">
        <!-- 图标将通过JavaScript生成 -->
    </div>
    
    <div>
        <button onclick="generateAllIcons()">生成所有图标</button>
        <button onclick="downloadAllIcons()">下载所有图标 (需要手动保存)</button>
    </div>
    
    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        function generateAllIcons() {
            const container = document.getElementById('iconContainer');
            container.innerHTML = '';
            
            sizes.forEach(size => {
                // 创建容器
                const box = document.createElement('div');
                box.className = 'icon-box';
                
                // 创建标题
                const title = document.createElement('div');
                title.textContent = `${size}x${size}`;
                title.style.marginBottom = '10px';
                title.style.fontWeight = 'bold';
                
                // 创建画布
                const canvas = document.createElement('canvas');
                canvas.className = 'icon-canvas';
                canvas.width = size;
                canvas.height = size;
                canvas.style.width = '100px';
                canvas.style.height = '100px';
                canvas.style.objectFit = 'contain';
                
                // 添加到容器
                box.appendChild(title);
                box.appendChild(canvas);
                container.appendChild(box);
                
                // 绘制图标
                drawIcon(canvas, size);
            });
        }
        
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            const center = size / 2;
            const radius = size * 0.4;
            
            // 清除画布
            ctx.clearRect(0, 0, size, size);
            
            // 绘制背景圆形
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#667eea';
            ctx.fill();
            
            // 绘制猫耳朵
            const earSize = size * 0.15;
            // 左耳
            ctx.beginPath();
            ctx.moveTo(center - radius * 0.5, center - radius * 0.3);
            ctx.lineTo(center - radius * 0.8, center - radius * 0.8);
            ctx.lineTo(center - radius * 0.2, center - radius * 0.5);
            ctx.closePath();
            ctx.fillStyle = '#764ba2';
            ctx.fill();
            
            // 右耳
            ctx.beginPath();
            ctx.moveTo(center + radius * 0.5, center - radius * 0.3);
            ctx.lineTo(center + radius * 0.8, center - radius * 0.8);
            ctx.lineTo(center + radius * 0.2, center - radius * 0.5);
            ctx.closePath();
            ctx.fillStyle = '#764ba2';
            ctx.fill();
            
            // 绘制猫脸
            ctx.beginPath();
            ctx.arc(center, center, radius * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = '#f8f9fa';
            ctx.fill();
            
            // 绘制眼睛
            const eyeSize = size * 0.08;
            // 左眼
            ctx.beginPath();
            ctx.arc(center - radius * 0.3, center - radius * 0.1, eyeSize, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
            
            // 右眼
            ctx.beginPath();
            ctx.arc(center + radius * 0.3, center - radius * 0.1, eyeSize, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
            
            // 绘制鼻子
            ctx.beginPath();
            ctx.arc(center, center + radius * 0.1, eyeSize * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = '#f5576c';
            ctx.fill();
            
            // 绘制嘴巴
            ctx.beginPath();
            ctx.arc(center, center + radius * 0.3, radius * 0.2, 0, Math.PI, false);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = size * 0.02;
            ctx.stroke();
            
            // 绘制胡须
            ctx.strokeStyle = '#333';
            ctx.lineWidth = size * 0.01;
            
            // 左胡须
            ctx.beginPath();
            ctx.moveTo(center - radius * 0.5, center + radius * 0.1);
            ctx.lineTo(center - radius * 0.9, center + radius * 0.05);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(center - radius * 0.5, center + radius * 0.2);
            ctx.lineTo(center - radius * 0.9, center + radius * 0.2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(center - radius * 0.5, center + radius * 0.3);
            ctx.lineTo(center - radius * 0.9, center + radius * 0.35);
            ctx.stroke();
            
            // 右胡须
            ctx.beginPath();
            ctx.moveTo(center + radius * 0.5, center + radius * 0.1);
            ctx.lineTo(center + radius * 0.9, center + radius * 0.05);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(center + radius * 0.5, center + radius * 0.2);
            ctx.lineTo(center + radius * 0.9, center + radius * 0.2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(center + radius * 0.5, center + radius * 0.3);
            ctx.lineTo(center + radius * 0.9, center + radius * 0.35);
            ctx.stroke();
            
            // 添加文字 "IELTS" (仅在大图标上)
            if (size >= 192) {
                ctx.font = `bold ${size * 0.1}px Arial`;
                ctx.fillStyle = '#667eea';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('IELTS', center, center + radius * 0.6);
            }
        }
        
        function downloadAllIcons() {
            alert('请右键点击每个图标，选择"图片另存为"，保存到 icons/ 文件夹。\n\n文件名格式：icon-[尺寸].png\n例如：icon-72.png, icon-192.png 等');
        }
        
        // 页面加载时自动生成图标
        window.onload = generateAllIcons;
    </script>
</body>
</html>
